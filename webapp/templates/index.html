<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blindspot — Blind Hiring Pipeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#070911;--ink-soft:rgba(255,255,255,.045);--ink-softer:rgba(255,255,255,.075);--ink-card:rgba(255,255,255,.055);
    --paper:#F3F5FA;--paper-dim:#9BA3B8;--steel:#8993AA;--steel-dark:#4A5468;
    --line-dark:rgba(255,255,255,.10);--line-med:rgba(255,255,255,.20);
    --gold:#E7B24E;--gold-soft:rgba(231,178,78,.16);--gold-glow:rgba(231,178,78,.38);
    --teal:#38E0C8;--teal-soft:rgba(56,224,200,.14);--teal-glow:rgba(56,224,200,.4);
    --topbar-bg:rgba(8,10,18,.5);--particle-op:0.4;
    --font-display:'Space Grotesk',sans-serif;
    --font-body:'Inter',sans-serif;
    --font-mono:'IBM Plex Mono',monospace;

    --glass-blur:24px;
    --glass-blur-lg:34px;
    --glass-hi:rgba(255,255,255,.5);
    --glass-shadow:0 1px 1px rgba(255,255,255,.06) inset, 0 8px 30px rgba(0,0,0,.4), 0 1px 0 rgba(255,255,255,.05) inset;
    --glass-shadow-lg:0 1px 1px rgba(255,255,255,.07) inset, 0 20px 60px rgba(0,0,0,.5), 0 1px 0 rgba(255,255,255,.06) inset;
    --r-xl:26px;--r-lg:20px;--r-md:15px;--r-sm:11px;--r-pill:999px;
    --aurora-a:#5C7CFA;--aurora-b:#38E0C8;--aurora-c:#E7B24E;--aurora-d:#C868F0;
  }
  body.light{
    --ink:#E9EDF5;--ink-soft:rgba(0,0,0,.03);--ink-softer:rgba(0,0,0,.045);--ink-card:rgba(255,255,255,.5);
    --paper:#1B2030;--paper-dim:#5B637A;--steel:#6C7488;--steel-dark:#AEB5C6;
    --line-dark:rgba(0,0,0,.08);--line-med:rgba(0,0,0,.14);
    --gold:#A6790E;--gold-soft:rgba(166,121,14,.12);--gold-glow:rgba(166,121,14,.24);
    --teal:#0F8B7A;--teal-soft:rgba(15,139,122,.12);--teal-glow:rgba(15,139,122,.26);
    --topbar-bg:rgba(255,255,255,.55);--particle-op:0.16;

    --glass-hi:rgba(255,255,255,.85);
    --glass-shadow:0 1px 1px rgba(255,255,255,.7) inset, 0 8px 28px rgba(60,70,110,.14), 0 1px 0 rgba(255,255,255,.5) inset;
    --glass-shadow-lg:0 1px 1px rgba(255,255,255,.8) inset, 0 24px 60px rgba(60,70,110,.18), 0 1px 0 rgba(255,255,255,.6) inset;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{background:var(--ink);color:var(--paper);font-family:var(--font-body);min-height:100vh;display:flex;flex-direction:column;overflow:hidden;transition:background .4s,color .4s;position:relative;}
  ::selection{background:var(--teal-soft);}
  button{font-family:var(--font-body);cursor:pointer;}
  :focus-visible{outline:2px solid var(--teal);outline-offset:2px;}
  code{font-family:var(--font-mono);}

  /* ── aurora backdrop (Mica-style ambient light behind the glass) ── */
  body::before{
    content:'';position:fixed;inset:-15%;z-index:-2;pointer-events:none;
    background:
      radial-gradient(circle at 14% 18%, color-mix(in srgb, var(--aurora-a) 55%, transparent) 0%, transparent 40%),
      radial-gradient(circle at 85% 8%, color-mix(in srgb, var(--aurora-b) 50%, transparent) 0%, transparent 42%),
      radial-gradient(circle at 78% 82%, color-mix(in srgb, var(--aurora-c) 42%, transparent) 0%, transparent 40%),
      radial-gradient(circle at 15% 88%, color-mix(in srgb, var(--aurora-d) 38%, transparent) 0%, transparent 42%);
    filter:blur(60px) saturate(140%);
    opacity:.55;
    transition:opacity .4s;
    animation:auroraDrift 26s ease-in-out infinite alternate;
  }
  body.light::before{opacity:.32;filter:blur(70px) saturate(150%);}
  @keyframes auroraDrift{
    0%{transform:translate3d(0,0,0) scale(1);}
    50%{transform:translate3d(-1.5%,1.5%,0) scale(1.04);}
    100%{transform:translate3d(1.5%,-1%,0) scale(1.02);}
  }
  body::after{
    content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:linear-gradient(180deg, rgba(0,0,0,.08), transparent 30%, transparent 70%, rgba(0,0,0,.16));
  }
  body.light::after{background:linear-gradient(180deg, rgba(255,255,255,.25), transparent 30%, transparent 70%, rgba(0,0,0,.03));}

  #particleCanvas{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:var(--particle-op);transition:opacity .4s;mix-blend-mode:screen;}
  body.light #particleCanvas{mix-blend-mode:multiply;}

  /* ══════════ glass surface helper — shared look for every panel/card ══════════ */
  .topbar,.stepper,.step,.job-card,.table-wrap,th,td,.bcol,.cand-row,.sealed-row,
  .thinking-bar,.trace-panel,.threshold-wrap,.approve-row,.sched-card,.diagram-wrap,
  .node,.rsc,.top-row,.privacy-stat,.agent-response,.error-box,.toast-item,
  .conn-pill,.agent-ticker,.theme-btn,.btn,.pill,.chip,.slot-chip,.confirm-btn,.email-badge,.empty-note{
    -webkit-backdrop-filter:blur(var(--glass-blur)) saturate(170%);
    backdrop-filter:blur(var(--glass-blur)) saturate(170%);
  }

  /* ── topbar (glass top navigation) ── */
  .topbar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 30px;border-bottom:1px solid var(--line-dark);background:var(--topbar-bg);flex-shrink:0;box-shadow:0 1px 0 var(--glass-hi) inset, 0 12px 28px rgba(0,0,0,.22);}
  .brand{display:flex;align-items:center;gap:14px;}
  .brand-mark{width:36px;height:36px;border-radius:12px;background:linear-gradient(135deg,var(--gold),var(--teal));display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:600;font-size:14px;color:#0E1218;box-shadow:0 0 22px var(--teal-glow), 0 1px 0 rgba(255,255,255,.5) inset;}
  .brand-name{font-family:var(--font-display);font-weight:700;font-size:19px;letter-spacing:-0.2px;}
  .brand-eyebrow{font-family:var(--font-mono);font-size:10px;letter-spacing:1.8px;color:var(--steel);text-transform:uppercase;margin-top:2px;}
  .topbar-right{display:flex;align-items:center;gap:14px;}
  .stat-strip{display:flex;gap:20px;font-family:var(--font-mono);font-size:11px;color:var(--steel);padding:8px 16px;border-radius:var(--r-pill);background:var(--ink-soft);border:1px solid var(--line-dark);}
  .stat-strip b{color:var(--paper);font-weight:600;}
  .stat-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:6px;animation:pulse 2.4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;box-shadow:0 0 8px currentColor;}}
  .agent-ticker{font-family:var(--font-mono);font-size:11px;color:var(--teal);background:var(--teal-soft);border:1px solid rgba(56,224,200,.25);padding:6px 14px;border-radius:var(--r-pill);display:flex;align-items:center;gap:8px;transition:opacity .3s;box-shadow:0 4px 16px var(--teal-glow);}
  .agent-ticker.hidden{opacity:0;pointer-events:none;}
  .ticker-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);animation:tpulse .8s ease-in-out infinite;}
  @keyframes tpulse{0%,100%{transform:scale(1);}50%{transform:scale(1.6);}}
  .theme-btn{background:var(--ink-card);border:1px solid var(--line-med);border-radius:var(--r-pill);padding:7px 15px;font-size:12px;color:var(--steel);display:flex;align-items:center;gap:6px;transition:background .2s,color .2s,transform .15s;flex-shrink:0;box-shadow:var(--glass-shadow);}
  .theme-btn:hover{background:var(--ink-softer);color:var(--paper);transform:translateY(-1px);}

  /* ── connection status ── */
  .conn-pill{font-family:var(--font-mono);font-size:10.5px;padding:6px 13px;border-radius:var(--r-pill);display:flex;align-items:center;gap:7px;border:1px solid var(--line-dark);}
  .conn-ok{background:var(--teal-soft);color:var(--teal);border-color:rgba(56,224,200,.28);}
  .conn-err{background:rgba(224,90,70,.12);color:#E85A46;border-color:rgba(224,90,70,.28);}
  .conn-checking{background:var(--ink-soft);color:var(--steel);}
  .conn-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}

  /* ── layout ── */
  .layout{display:flex;flex:1;min-height:0;position:relative;z-index:1;}
  .stepper{width:250px;flex-shrink:0;padding:22px 14px;display:flex;flex-direction:column;gap:5px;background:var(--ink-soft);border-right:1px solid var(--line-dark);overflow-y:auto;margin:14px 0 14px 14px;border-radius:var(--r-xl);box-shadow:var(--glass-shadow-lg);border:1px solid var(--line-dark);}
  .step{display:flex;align-items:flex-start;gap:12px;padding:11px 13px;border-radius:var(--r-md);cursor:pointer;transition:background .25s,transform .15s,box-shadow .25s;border:1px solid transparent;}
  .step:hover:not(.locked){background:var(--ink-card);transform:translateX(3px);}
  .step.active{background:var(--ink-card);border-color:var(--line-med);box-shadow:var(--glass-shadow);}
  .step-num{font-family:var(--font-mono);font-size:11px;color:var(--steel);width:23px;height:23px;border-radius:50%;border:1px solid var(--steel-dark);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .3s;}
  .step.active .step-num{border-color:var(--teal);color:var(--teal);box-shadow:0 0 12px var(--teal-soft);background:var(--teal-soft);}
  .step.done .step-num{background:linear-gradient(135deg,var(--teal),var(--gold));border-color:transparent;color:#0E1218;box-shadow:0 0 14px var(--teal-glow);}
  .step-label{font-size:13.5px;font-weight:500;color:var(--paper);}
  .step-sub{font-size:11px;color:var(--steel);margin-top:2px;line-height:1.4;}
  .step.locked{opacity:.32;cursor:not-allowed;}
  .step.locked:hover{transform:none;}
  .pbar-outer{height:3px;background:rgba(255,255,255,.06);border-radius:3px;margin:0 4px 16px;overflow:hidden;}
  body.light .pbar-outer{background:rgba(0,0,0,.07);}
  .pbar-inner{height:100%;background:linear-gradient(90deg,var(--teal),var(--gold));border-radius:3px;box-shadow:0 0 10px var(--teal-glow);transition:width .6s cubic-bezier(.16,1,.3,1);}

  .stage{flex:1;overflow-y:auto;padding:28px 40px 80px;scroll-behavior:smooth;}

  /* stage header */
  .shr{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:24px;flex-wrap:wrap;}
  .sh{flex:1;min-width:0;}
  .sha{display:flex;gap:10px;align-items:center;flex-shrink:0;padding-top:6px;flex-wrap:wrap;}
  .eyebrow{font-family:var(--font-mono);font-size:10.5px;letter-spacing:1.6px;color:var(--steel);text-transform:uppercase;margin-bottom:9px;display:flex;align-items:center;gap:10px;}
  .eyebrow::before{content:'';display:block;width:20px;height:1px;background:var(--steel);}
  .stage-title{font-family:var(--font-display);font-size:28px;font-weight:700;margin:0 0 8px;letter-spacing:-.3px;}
  .stage-desc{color:var(--steel);font-size:14px;max-width:560px;line-height:1.65;}

  /* buttons — liquid glass pills */
  .btn{font-size:13px;font-weight:600;padding:11px 22px;border-radius:var(--r-pill);border:1px solid var(--line-med);display:inline-flex;align-items:center;gap:8px;transition:opacity .15s,transform .15s,box-shadow .2s,background .2s;position:relative;overflow:hidden;white-space:nowrap;background:var(--ink-card);color:var(--paper);box-shadow:var(--glass-shadow);}
  .btn::before{content:'';position:absolute;inset:0 0 auto 0;height:50%;background:linear-gradient(180deg,var(--glass-hi),transparent);opacity:.16;pointer-events:none;}
  .btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 26px rgba(0,0,0,.25),var(--glass-shadow);}
  .btn:active:not(:disabled){transform:translateY(0);}
  .btn:disabled{opacity:.35;cursor:not-allowed;}
  .btn-primary{background:linear-gradient(135deg, color-mix(in srgb, var(--teal) 75%, transparent), color-mix(in srgb, var(--teal) 45%, transparent));color:#04211C;border-color:rgba(56,224,200,.4);box-shadow:0 6px 22px var(--teal-glow), var(--glass-shadow);text-shadow:0 1px 0 rgba(255,255,255,.25);}
  .btn-primary:hover:not(:disabled){box-shadow:0 10px 32px var(--teal-glow), var(--glass-shadow);}
  .btn-ghost{background:var(--ink-soft);color:var(--paper);border:1px solid var(--line-med);box-shadow:none;}
  .btn-ghost:hover:not(:disabled){border-color:var(--steel);background:var(--ink-card);}
  .btn-gold{background:linear-gradient(135deg, color-mix(in srgb, var(--gold) 75%, transparent), color-mix(in srgb, var(--gold) 45%, transparent));color:#241A02;border-color:rgba(231,178,78,.4);box-shadow:0 6px 22px var(--gold-glow), var(--glass-shadow);text-shadow:0 1px 0 rgba(255,255,255,.25);}
  .btn-gold:hover:not(:disabled){box-shadow:0 10px 32px var(--gold-glow), var(--glass-shadow);}
  .btn-sm{padding:9px 16px;font-size:12px;}
  .btn-loading{opacity:.6;cursor:wait;}
  .spin{display:inline-block;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* cards — floating glass panels */
  .grid-jobs{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:16px;margin-top:18px;}
  .job-card{background:var(--ink-card);border:1px solid var(--line-dark);border-radius:var(--r-lg);padding:21px;cursor:pointer;transition:border-color .25s,transform .25s,box-shadow .25s;animation:fadeUp .5s cubic-bezier(.16,1,.3,1) both;box-shadow:var(--glass-shadow);position:relative;}
  .job-card::before{content:'';position:absolute;top:0;left:14px;right:14px;height:1px;background:linear-gradient(90deg,transparent,var(--glass-hi),transparent);opacity:.5;}
  .job-card:nth-child(2){animation-delay:.07s;}.job-card:nth-child(3){animation-delay:.14s;}.job-card:nth-child(4){animation-delay:.21s;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
  .job-card:hover{border-color:rgba(56,224,200,.45);transform:translateY(-5px);box-shadow:0 20px 44px rgba(56,224,200,.12),var(--glass-shadow);}
  .job-card.selected{border-color:var(--teal);background:var(--ink-softer);box-shadow:0 0 0 1.5px var(--teal),0 20px 50px rgba(56,224,200,.16),var(--glass-shadow);}
  .job-title{font-family:var(--font-display);font-size:16px;font-weight:600;margin:11px 0 4px;}
  .job-meta{font-size:12px;color:var(--steel);display:flex;gap:14px;margin-top:11px;flex-wrap:wrap;}
  .job-meta b{color:var(--paper);}
  .pill{display:inline-block;font-family:var(--font-mono);font-size:10px;padding:4px 11px;border-radius:var(--r-pill);letter-spacing:.5px;font-weight:500;border:1px solid transparent;}
  .pill-open{background:var(--teal-soft);color:var(--teal);border-color:rgba(56,224,200,.25);}

  /* table */
  .table-wrap{border-radius:var(--r-lg);overflow:hidden;border:1px solid var(--line-dark);box-shadow:var(--glass-shadow-lg);background:var(--ink-card);}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;font-family:var(--font-mono);font-size:10px;letter-spacing:1px;color:var(--steel);text-transform:uppercase;padding:13px 18px;background:var(--ink-softer);border-bottom:1px solid var(--line-dark);}
  td{padding:13px 18px;border-bottom:1px solid var(--line-dark);background:transparent;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:var(--ink-softer);}
  .avatar{width:29px;height:29px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--paper);margin-right:11px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.3), 0 0 0 1px rgba(255,255,255,.12) inset;}
  .name-cell{display:flex;align-items:center;}

  /* screening */
  .bwrap{display:flex;margin-top:20px;border-radius:var(--r-lg);overflow:hidden;border:1px solid var(--line-dark);box-shadow:var(--glass-shadow-lg);}
  .bcol{flex:1;padding:21px;min-width:0;background:var(--ink-card);}
  .col-vis{background:var(--ink-card);}
  .col-hid{background:rgba(0,0,0,.16);}
  body.light .col-hid{background:rgba(0,0,0,.045);}
  .col-head{display:flex;align-items:center;gap:10px;margin-bottom:15px;padding-bottom:13px;border-bottom:1px solid var(--line-dark);}
  .col-head-title{font-family:var(--font-display);font-weight:600;font-size:14px;}
  .col-head-sub{font-family:var(--font-mono);font-size:10px;color:var(--steel);margin-top:2px;}
  .divider{width:2px;flex-shrink:0;position:relative;background:repeating-linear-gradient(180deg,var(--gold) 0 6px,transparent 6px 14px);opacity:.65;}
  .divider::after{content:'sly_data boundary';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(90deg);white-space:nowrap;font-family:var(--font-mono);font-size:9px;letter-spacing:1.5px;color:var(--gold);text-transform:uppercase;background:var(--ink);padding:5px 9px;border-radius:var(--r-sm);border:1px solid var(--gold-soft);}
  body.light .divider::after{background:var(--ink-soft);}
  .cand-row{display:flex;align-items:center;justify-content:space-between;padding:12px 13px;border-radius:var(--r-md);margin-bottom:8px;background:var(--ink-softer);border:1px solid var(--line-dark);opacity:0;transform:translateY(8px);transition:border-color .2s,background .2s;}
  .cand-row.visible{animation:riseIn .5s cubic-bezier(.16,1,.3,1) forwards;}
  .cand-row:hover{background:var(--ink-card);border-color:var(--line-med);}
  @keyframes riseIn{to{opacity:1;transform:translateY(0);}}
  .rank-badge{font-family:var(--font-mono);font-size:10px;color:var(--steel);width:25px;height:25px;border-radius:var(--r-sm);border:1px solid var(--steel-dark);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-right:11px;background:var(--ink-soft);}
  .rank-badge.top{border-color:var(--teal);color:var(--teal);background:var(--teal-soft);box-shadow:0 0 10px var(--teal-soft);}
  .cand-id{font-family:var(--font-mono);font-size:12px;color:var(--paper);font-weight:500;}
  .cand-skill{font-size:11px;color:var(--steel);margin-top:2px;max-width:290px;line-height:1.4;}
  .sbar-wrap{width:76px;height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;flex-shrink:0;}
  .sbar{height:100%;background:linear-gradient(90deg,var(--teal),var(--gold));border-radius:3px;width:0;transition:width .8s cubic-bezier(.16,1,.3,1);box-shadow:0 0 8px var(--teal-glow);}
  .snum{font-family:var(--font-mono);font-size:12px;color:var(--teal);width:28px;text-align:right;flex-shrink:0;}
  .sr-right{display:flex;align-items:center;gap:9px;}
  .sealed-row{display:flex;align-items:center;gap:11px;padding:12px 13px;border-radius:var(--r-md);margin-bottom:8px;background:var(--gold-soft);border:1px solid rgba(231,178,78,.22);opacity:0;animation:riseIn .5s ease forwards;}
  .lock-icon{font-size:14px;flex-shrink:0;}
  .blur-text{filter:blur(6px);user-select:none;color:var(--paper);font-size:12.5px;transition:filter .7s cubic-bezier(.16,1,.3,1),color .5s;}
  .blur-text.revealed{filter:blur(0);color:var(--teal);}
  .sealed-label{font-family:var(--font-mono);font-size:10px;color:var(--gold);letter-spacing:.6px;margin-top:2px;}

  /* thinking */
  .thinking-bar{display:flex;align-items:center;gap:12px;padding:14px 18px;border-radius:var(--r-md);background:var(--ink-softer);border:1px solid var(--line-dark);margin-bottom:15px;animation:fadeUp .3s ease;box-shadow:var(--glass-shadow);}
  .thinking-dots{display:flex;gap:5px;}
  .thinking-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);animation:bounce 1.2s ease-in-out infinite;}
  .thinking-dot:nth-child(2){animation-delay:.15s;}.thinking-dot:nth-child(3){animation-delay:.3s;}
  @keyframes bounce{0%,100%{transform:translateY(0);opacity:.4;}50%{transform:translateY(-5px);opacity:1;}}
  .thinking-text{font-family:var(--font-mono);font-size:12px;color:var(--steel);}
  .ta{color:var(--teal);}
  .trace-panel{background:var(--ink-soft);border:1px solid var(--line-dark);border-radius:var(--r-md);padding:15px 19px;margin-bottom:17px;font-family:var(--font-mono);font-size:11.5px;box-shadow:var(--glass-shadow);}
  .trace-hdr{color:var(--steel);font-size:10px;letter-spacing:1px;text-transform:uppercase;margin-bottom:11px;}
  .trace-step{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--line-dark);opacity:0;animation:riseIn .3s ease forwards;}
  .trace-step:last-child{border-bottom:none;}
  .ti{font-size:12px;width:18px;text-align:center;flex-shrink:0;}
  .tl{color:var(--paper);flex:1;}
  .ts{font-size:10px;padding:3px 9px;border-radius:var(--r-pill);}
  .ts-run{background:var(--teal-soft);color:var(--teal);}
  .ts-done{background:var(--ink-soft);color:var(--steel);}

  /* approve */
  .threshold-wrap{background:var(--ink-card);border:1px solid var(--line-dark);border-radius:var(--r-lg);padding:18px 22px;margin-bottom:16px;box-shadow:var(--glass-shadow);}
  .threshold-label{font-size:13px;color:var(--steel);margin-bottom:13px;}
  .threshold-row{display:flex;align-items:center;gap:16px;}
  .slider-custom{-webkit-appearance:none;appearance:none;width:200px;height:5px;border-radius:5px;outline:none;cursor:pointer;background:linear-gradient(90deg,var(--teal) calc(var(--val,50%)),rgba(255,255,255,.12) calc(var(--val,50%)));}
  .slider-custom::-webkit-slider-thumb{-webkit-appearance:none;width:19px;height:19px;border-radius:50%;background:var(--teal);border:3px solid var(--ink);box-shadow:0 0 14px var(--teal-glow);cursor:grab;}
  .slider-custom::-webkit-slider-thumb:active{cursor:grabbing;transform:scale(1.2);}
  .tval{font-family:var(--font-mono);font-size:22px;font-weight:600;color:var(--teal);min-width:36px;text-align:center;text-shadow:0 0 22px var(--teal-glow);}
  .approve-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
  .approve-row{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-radius:var(--r-lg);border:1px solid var(--line-dark);background:var(--ink-card);transition:background .4s,border-color .4s,box-shadow .4s;animation:fadeUp .3s ease both;box-shadow:var(--glass-shadow);}
  .approve-row.will-approve{border-color:rgba(231,178,78,.3);background:var(--gold-soft);}
  .approve-row.revealed{background:var(--teal-soft);border-color:rgba(56,224,200,.4);box-shadow:0 8px 26px var(--teal-glow),var(--glass-shadow);}
  .approve-left{display:flex;align-items:center;gap:14px;}
  .chip{font-family:var(--font-mono);font-size:10px;padding:5px 11px;border-radius:var(--r-pill);font-weight:500;letter-spacing:.3px;border:1px solid transparent;}
  .chip-locked{background:var(--gold-soft);color:var(--gold);border-color:rgba(231,178,78,.25);}
  .chip-open{background:var(--teal-soft);color:var(--teal);border-color:rgba(56,224,200,.25);}
  .chip-out{background:var(--ink-soft);color:var(--steel);border-color:var(--line-dark);}

  /* schedule */
  .sched-card{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;border-radius:var(--r-lg);border:1px solid var(--line-dark);background:var(--ink-card);margin-bottom:12px;transition:border-color .3s,box-shadow .3s;animation:fadeUp .4s ease both;box-shadow:var(--glass-shadow);}
  .sched-card.confirmed{border-color:rgba(56,224,200,.35);box-shadow:0 0 24px var(--teal-glow),var(--glass-shadow);}
  .avail-cols{display:flex;gap:22px;font-size:11px;color:var(--steel);margin-top:8px;}
  .avail-col b{display:block;color:var(--paper);font-family:var(--font-mono);font-size:10px;margin-bottom:4px;}
  .slot-chip{font-family:var(--font-mono);font-size:11px;background:var(--teal-soft);color:var(--teal);padding:7px 13px;border-radius:var(--r-md);display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(56,224,200,.25);}
  .confirm-btn{font-family:var(--font-mono);font-size:11px;background:var(--ink-soft);border:1px solid var(--teal);color:var(--teal);padding:7px 14px;border-radius:var(--r-md);cursor:pointer;transition:background .2s,color .2s,box-shadow .2s,transform .1s;margin-left:11px;}
  .confirm-btn:hover{background:var(--teal-soft);}
  .confirm-btn:active{transform:scale(.97);}
  .confirm-btn.done{background:linear-gradient(135deg,var(--teal),color-mix(in srgb, var(--teal) 60%, var(--gold)));color:#04211C;border-color:transparent;box-shadow:0 6px 18px var(--teal-glow);}
  .email-badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:10px;color:var(--teal);background:var(--teal-soft);border:1px solid rgba(56,224,200,.25);padding:4px 10px;border-radius:var(--r-pill);margin-left:9px;animation:pop .4s cubic-bezier(.34,1.56,.64,1) both;}
  @keyframes pop{from{opacity:0;transform:scale(.6);}to{opacity:1;transform:scale(1);}}

  /* architecture */
  .diagram-wrap{margin-top:22px;background:var(--ink-card);border:1px solid var(--line-dark);border-radius:var(--r-xl);padding:28px;overflow-x:auto;box-shadow:var(--glass-shadow-lg);}
  .flow-row{display:flex;align-items:center;gap:0;flex-wrap:nowrap;min-width:880px;}
  .node{font-family:var(--font-mono);font-size:11px;text-align:center;padding:14px 14px;border-radius:var(--r-md);border:1px solid var(--line-dark);min-width:120px;transition:border-color .2s,box-shadow .2s,transform .2s;cursor:default;background:var(--ink-soft);}
  .node-agent{background:var(--teal-soft);border-color:rgba(56,224,200,.25);}
  .node-agent:hover{box-shadow:0 0 22px var(--teal-soft);border-color:rgba(56,224,200,.45);transform:translateY(-2px);}
  .node-tool{background:var(--gold-soft);border-color:rgba(231,178,78,.25);border-style:dashed;}
  .node-tool:hover{box-shadow:0 0 22px var(--gold-soft);transform:translateY(-2px);}
  .node-label{font-size:9px;letter-spacing:.7px;color:var(--steel);text-transform:uppercase;margin-top:4px;}
  .arrow{padding:0 5px;display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;}
  .arrow-line{width:22px;height:1px;background:linear-gradient(90deg,transparent,var(--steel-dark),transparent);}
  .arrow-head{font-size:10px;color:var(--steel-dark);}
  .btag{font-family:var(--font-mono);font-size:9px;background:var(--gold-soft);color:var(--gold);padding:3px 8px;border-radius:var(--r-sm);display:block;margin-top:4px;border:1px solid rgba(231,178,78,.18);}
  .legend{display:flex;gap:22px;margin-top:24px;font-size:12px;color:var(--steel);flex-wrap:wrap;}
  .ls{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:7px;vertical-align:middle;}
  .run-stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(172px,1fr));gap:12px;margin-top:19px;}
  .rsc{background:var(--ink-card);border:1px solid var(--line-dark);border-radius:var(--r-lg);padding:16px 18px;animation:fadeUp .4s ease both;box-shadow:var(--glass-shadow);}
  .rsc:nth-child(2){animation-delay:.06s;}.rsc:nth-child(3){animation-delay:.12s;}.rsc:nth-child(4){animation-delay:.18s;}.rsc:nth-child(5){animation-delay:.24s;}
  .rsv{font-family:var(--font-mono);font-size:24px;font-weight:600;color:var(--teal);line-height:1;margin-bottom:5px;}
  .rsv.gold{color:var(--gold);}
  .rsl{font-size:11.5px;color:var(--steel);line-height:1.4;}
  .top-list{margin-top:19px;display:flex;flex-direction:column;gap:8px;}
  .top-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-radius:var(--r-md);border:1px solid var(--line-dark);background:var(--ink-card);animation:fadeUp .3s ease both;box-shadow:var(--glass-shadow);}
  .top-row:first-child{border-color:rgba(231,178,78,.35);background:var(--gold-soft);}
  .privacy-stat{margin-top:15px;padding:16px 20px;border:1px solid var(--line-dark);border-radius:var(--r-lg);background:var(--teal-soft);font-size:13.5px;color:var(--paper);line-height:1.65;box-shadow:var(--glass-shadow);}
  .privacy-stat b{color:var(--teal);}
  .empty-note{margin-top:46px;padding:30px;border:1px dashed var(--line-med);border-radius:var(--r-lg);color:var(--steel);font-size:14px;text-align:center;line-height:1.65;background:var(--ink-soft);}

  /* agent response box */
  .agent-response{margin-top:19px;background:var(--ink-softer);border:1px solid var(--line-dark);border-radius:var(--r-lg);padding:19px 21px;font-size:13.5px;line-height:1.7;white-space:pre-wrap;max-height:300px;overflow-y:auto;box-shadow:var(--glass-shadow);}
  .agent-response-label{font-family:var(--font-mono);font-size:10px;letter-spacing:1px;color:var(--teal);text-transform:uppercase;margin-bottom:11px;}

  /* error box */
  .error-box{background:rgba(224,90,70,.1);border:1px solid rgba(224,90,70,.32);border-radius:var(--r-lg);padding:17px 19px;color:#E85A46;font-size:13px;margin-top:15px;line-height:1.6;box-shadow:var(--glass-shadow);}

  /* global toast */
  #gToast{position:fixed;bottom:26px;right:26px;z-index:1000;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
  .toast-item{display:flex;align-items:center;gap:9px;background:var(--ink-card);border:1px solid var(--teal);color:var(--teal);font-family:var(--font-mono);font-size:12px;padding:10px 16px;border-radius:var(--r-lg);box-shadow:0 12px 30px var(--teal-glow),var(--glass-shadow);animation:tin .4s cubic-bezier(.34,1.56,.64,1) both,tout .3s ease 2.8s both;}
  @keyframes tin{from{opacity:0;transform:translateX(24px) scale(.95);}to{opacity:1;transform:translateX(0) scale(1);}}
  @keyframes tout{to{opacity:0;transform:translateY(6px);}}

  ::-webkit-scrollbar{width:7px;height:7px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--steel-dark);border-radius:4px;}
  ::-webkit-scrollbar-thumb:hover{background:var(--steel);}

  @media (max-width:900px){
    .stepper{width:210px;}
    .stage{padding:22px 20px 70px;}
  }
</style>
</head>
<body>
<canvas id="particleCanvas"></canvas>
<div id="gToast"></div>

<div class="topbar">
  <div class="brand">
    <div class="brand-mark">B</div>
    <div>
      <div class="brand-name">Blindspot</div>
      <div class="brand-eyebrow">Blind hiring · Neuro-SAN agent network</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="conn-pill conn-checking" id="connPill">
      <div class="conn-dot"></div>
      <span id="connText">Checking…</span>
    </div>
    <div class="agent-ticker hidden" id="agentTicker">
      <div class="ticker-dot"></div>
      <span id="tickerText">Agent running…</span>
    </div>
    <div class="stat-strip">
      <span><span class="stat-dot" style="background:var(--teal)"></span>Agents: <b id="statAgent">0</b></span>
      <span><span class="stat-dot" style="background:var(--gold)"></span>Tools: <b id="statTool">0</b></span>
      <span><span class="stat-dot" style="background:var(--steel)"></span>PII exposed: <b style="color:var(--teal)">0</b></span>
    </div>
    <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙 Dark</button>
  </div>
</div>

<div class="layout">
  <div class="stepper" id="stepper"></div>
  <div class="stage" id="stage"></div>
</div>

<script>
/* ── Particles ── */
(function(){
  const cv=document.getElementById('particleCanvas'),ctx=cv.getContext('2d');
  let W,H,P=[];
  function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
  resize();addEventListener('resize',resize);
  class Pt{constructor(){this.reset();}reset(){this.x=Math.random()*W;this.y=Math.random()*H;this.vx=(Math.random()-.5)*.25;this.vy=(Math.random()-.5)*.25;this.r=Math.random()*1.4+.4;this.a=Math.random()*.4+.1;this.c=Math.random()>.5?'46,196,176':'201,162,39';}update(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>W||this.y<0||this.y>H)this.reset();}draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=`rgba(${this.c},${this.a})`;ctx.fill();}}
  for(let i=0;i<80;i++)P.push(new Pt());
  function loop(){ctx.clearRect(0,0,W,H);P.forEach(p=>{p.update();p.draw();});for(let i=0;i<P.length;i++)for(let j=i+1;j<P.length;j++){const dx=P[i].x-P[j].x,dy=P[i].y-P[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<90){ctx.beginPath();ctx.moveTo(P[i].x,P[i].y);ctx.lineTo(P[j].x,P[j].y);ctx.strokeStyle=`rgba(46,196,176,${.04*(1-d/90)})`;ctx.lineWidth=.5;ctx.stroke();}}requestAnimationFrame(loop);}
  loop();
})();

/* ── Theme ── */
let isDark=true;
function toggleTheme(){isDark=!isDark;document.body.classList.toggle('light',!isDark);document.getElementById('themeBtn').textContent=isDark?'🌙 Dark':'☀️ Light';}

/* ── Toast ── */
function showToast(text,delay=0){
  setTimeout(()=>{const el=document.getElementById('gToast'),d=document.createElement('div');d.className='toast-item';d.innerHTML=`<span>✓</span>${text}`;el.appendChild(d);setTimeout(()=>d.remove(),3200);},delay);
}

/* ── Stats ── */
function showTicker(t){document.getElementById('tickerText').textContent=t;document.getElementById('agentTicker').classList.remove('hidden');}
function hideTicker(){document.getElementById('agentTicker').classList.add('hidden');}
function bumpStat(k,n=1){if(k==='agent')S.agentCalls+=n;else S.toolCalls+=n;document.getElementById('statAgent').textContent=S.agentCalls;document.getElementById('statTool').textContent=S.toolCalls;}

/* ── Connection check ── */
async function checkConnection(){
  try{
    const r=await fetch('/api/check-neuro-san');
    const d=await r.json();
    const pill=document.getElementById('connPill');
    const txt=document.getElementById('connText');
    if(d.neuro_san_running){
      pill.className='conn-pill conn-ok';
      txt.textContent='Neuro SAN connected';
    } else {
      pill.className='conn-pill conn-err';
      txt.textContent='Neuro SAN offline';
    }
  } catch(e){
    document.getElementById('connPill').className='conn-pill conn-err';
    document.getElementById('connText').textContent='Server offline';
  }
}

/* ── App state ── */
const S={
  stage:1, jobId:null, jobTitle:'', jobCount:0,
  screeningRan:false, ranked:[], threshold:3, topN:3,
  approvedIds:new Set(), approvedCandidates:[], revealed:false, scheduled:{},
  agentCalls:0, toolCalls:0,
  runStart:null, runEnd:null,
  agentResponse:'', tokenInfo:{},
  roles:[], applicants:[]
};

const STEPS=[
  {n:1,label:'Open roles',sub:'Career portal'},
  {n:2,label:'Applicant pool',sub:'Raw submissions'},
  {n:3,label:'Blind screening',sub:'Ranking agent + sly_data'},
  {n:4,label:'Approve & reveal',sub:'Identity resolver'},
  {n:5,label:'Schedule interviews',sub:'Availability matcher'},
  {n:6,label:'Agent network',sub:'Architecture view'}
];

/* ── Navigation ── */
function goTo(n){
  if(n===2&&!S.jobId)return;
  if(n>2&&!S.jobId)return;
  if(n>3&&!S.screeningRan)return;
  if(n>4&&!S.screeningRan)return;
  S.stage=n;render();document.getElementById('stage').scrollTop=0;
}
function pct(){return{1:5,2:20,3:45,4:65,5:85,6:100}[S.stage]||5;}

/* ── Stepper ── */
function renderStepper(){
  document.getElementById('stepper').innerHTML=
    `<div class="pbar-outer"><div class="pbar-inner" style="width:${pct()}%"></div></div>`+
    STEPS.map(s=>{
      const locked=(s.n===2&&!S.jobId)||(s.n>2&&!S.jobId)||(s.n>3&&s.n<6&&!S.screeningRan);
      const done=s.n<S.stage,active=s.n===S.stage;
      return `<div class="step ${active?'active':''} ${done?'done':''} ${locked?'locked':''}" onclick="goTo(${s.n})">
        <div class="step-num">${done?'✓':s.n}</div>
        <div><div class="step-label">${s.label}</div><div class="step-sub">${s.sub}</div></div>
      </div>`;
    }).join('');
}

function render(){
  renderStepper();
  document.getElementById('stage').innerHTML=
    ({1:r1,2:r2,3:r3,4:r4,5:r5,6:r6}[S.stage]||r1)();
}

/* ══════════════════════════════════════
   STAGE 1 — Open roles (from API)
══════════════════════════════════════ */
function r1(){
  if(S.roles.length===0){
    return `<div class="shr"><div class="sh"><div class="eyebrow">Career portal</div><h1 class="stage-title">Open roles</h1></div></div>
    <div style="display:flex;align-items:center;gap:12px;padding:20px;color:var(--steel);font-family:var(--font-mono);font-size:13px;">
      <span class="spin">⟳</span> Loading roles from database…
    </div>`;
  }
  return `<div class="shr">
    <div class="sh"><div class="eyebrow">Career portal</div><h1 class="stage-title">Open roles</h1><div class="stage-desc">Select a role to load its applicant pool. Identity is stripped before any LLM reasoning begins.</div></div>
    ${S.jobId?`<div class="sha"><button class="btn btn-primary" onclick="goTo(2)">View applicant pool →</button></div>`:''}
  </div>
  <div class="grid-jobs">
    ${S.roles.map((r,i)=>`<div class="job-card ${S.jobId===r.role?'selected':''}" style="animation-delay:${i*.07}s" data-role="${r.role.replace(/"/g,'&quot;')}" data-count="${r.count}" onclick="handleJobClick(this)">
      <span class="pill pill-open">OPEN</span>
      <div class="job-title">${r.role}</div>
      <div style="color:var(--steel);font-size:12px;">Hiring</div>
      <div class="job-meta"><span><b>${r.count.toLocaleString()}</b> applicants</span><span>Active</span></div>
    </div>`).join('')}
  </div>`;
}

async function loadRoles(){
  try{
    const r=await fetch('/api/roles');
    S.roles=await r.json();
    render();
  } catch(e){
    document.getElementById('stage').innerHTML=`<div class="error-box">Could not load roles from database. Make sure Flask is running and the database exists at <code>data/blindspot.db</code>.<br><br>${e.message}</div>`;
  }
}

function handleJobClick(el){
  const role=el.getAttribute('data-role');
  const count=parseInt(el.getAttribute('data-count'));
  selJob(role,count);
}

function selJob(role,count){
  S.jobId=role;S.jobTitle=role;S.jobCount=count;
  S.screeningRan=false;S.ranked=[];S.approvedIds=new Set();S.approvedCandidates=[];
  S.revealed=false;S.scheduled={};S.agentResponse='';S.applicants=[];
  render();
}

/* ══════════════════════════════════════
   STAGE 2 — Applicant pool (from API)
══════════════════════════════════════ */
function r2(){
  if(S.applicants.length===0){
    return `<div class="shr">
      <div class="sh"><div class="eyebrow">${S.jobId}</div><h1 class="stage-title">Applicant pool</h1></div>
      <div class="sha"><button class="btn btn-primary" onclick="goTo(3)">Run blind screening →</button></div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;padding:20px;color:var(--steel);font-family:var(--font-mono);font-size:13px;">
      <span class="spin">⟳</span> Loading applicants…
    </div>`;
  }
  return `<div class="shr">
    <div class="sh"><div class="eyebrow">${S.jobId}</div><h1 class="stage-title">Applicant pool</h1><div class="stage-desc">Showing ${S.applicants.length} of ${S.jobCount.toLocaleString()} applications with full identity visible — nothing screened yet.</div></div>
    <div class="sha">
      <button class="btn btn-primary" onclick="goTo(3)">Run blind screening →</button>
      <button class="btn btn-ghost btn-sm" onclick="goTo(1)">← Back</button>
    </div>
  </div>
  <div class="table-wrap"><table>
    <thead><tr><th>Candidate</th><th>Exp</th><th>Skills</th><th>Education</th><th>Status</th></tr></thead>
    <tbody>${S.applicants.map((a,i)=>`
      <tr style="animation:fadeUp .3s ease ${i*.04}s both">
        <td><div class="name-cell"><span class="avatar" style="background:hsl(${i*37+160},30%,28%)">${a.name.split(' ').map(w=>w[0]).join('')}</span>${a.name}</div></td>
        <td style="font-family:var(--font-mono);font-size:12px;">${a.experience_years} yrs</td>
        <td style="color:var(--steel);max-width:260px;font-size:12px;">${a.skills}</td>
        <td style="color:var(--steel);font-size:12px;">${a.education}</td>
        <td><span class="pill" style="background:rgba(255,255,255,.05);color:var(--steel);border:1px solid var(--line-dark);">Unscreened</span></td>
      </tr>`).join('')}
    </tbody>
  </table></div>`;
}

async function loadApplicants(){
  try{
    const r=await fetch(`/api/applicants/${encodeURIComponent(S.jobId)}`);
    S.applicants=await r.json();
    render();
  } catch(e){ console.error(e); }
}

/* ══════════════════════════════════════
   STAGE 3 — Blind screening (live agent)
══════════════════════════════════════ */
function r3(){
  return `<div class="shr">
    <div class="sh"><div class="eyebrow">${S.jobId}</div><h1 class="stage-title">Blind screening</h1><div class="stage-desc">The ranking agent sees only anonymized profiles. Real identities sit sealed in <code style="color:var(--gold)">sly_data</code> — no LLM ever reads it.</div></div>
    <div class="sha">
      <button class="btn btn-primary" id="runBtn" onclick="runScreening()" ${S.screeningRan?'disabled':''}>${S.screeningRan?'✓ Screening complete':'Run ranking agent'}</button>
      <button class="btn btn-ghost btn-sm" onclick="goTo(4)" ${!S.screeningRan?'disabled':''}>Proceed to approval →</button>
    </div>
  </div>
  <div class="threshold-wrap" style="margin-bottom:18px;">
    <div class="threshold-label">Candidates to approve &amp; reveal identity for</div>
    <div class="threshold-row">
      <input type="number" id="topNInput" min="1" max="${S.jobCount}" value="${S.topN}"
        style="width:84px;padding:9px 12px;border-radius:var(--r-md);border:1px solid var(--line-med);background:var(--ink-soft);color:var(--paper);font-family:var(--font-mono);font-size:15px;"
        oninput="setTopN(this.value)" ${S.screeningRan?'disabled':''}>

function buildRankedFromStructured(rankingArr,applicants){
  if(!Array.isArray(rankingArr)||rankingArr.length===0)return[];
  const out=[],used=new Set();
  rankingArr.forEach((r,i)=>{
    const name=(r.name||'').trim();
    const match=applicants.find(a=>a.name&&a.name.trim().toLowerCase()===name.toLowerCase()&&!used.has(a.resume_id));
    if(match){
      used.add(match.resume_id);
      out.push({
        ...match,
        candId:r.candidate_id||`Candidate_${String(i+1).padStart(2,'0')}`,
        score:Math.min(100,Math.max(0,parseInt(r.score)||0)),
        rank:i+1,
        justification:r.justification||''
      });
    }
  });
  return out;
}

function parseAgentRanking(text,applicants){
  if(!text)return[];
  // Matches patterns like "#1: Jacqueline Lee** (Score: 95/100)" inside the
  // orchestrator's markdown summary — tolerant of emoji/markdown noise around it.
  const re=/#(\d+):\s*([^*\n(]+?)\*{0,2}\s*\(?Score:?\s*(\d+)/gi;
  const out=[],used=new Set();
  let m;
  while((m=re.exec(text))!==null){
    const rank=parseInt(m[1]),name=m[2].trim(),score=parseInt(m[3]);
    const match=applicants.find(a=>a.name&&a.name.trim().toLowerCase()===name.toLowerCase()&&!used.has(a.resume_id));
    if(match){
      used.add(match.resume_id);
      out.push({...match,candId:`Candidate_${String(rank).padStart(2,'0')}`,score:Math.min(100,Math.max(0,score)),rank});
    }
  }
  out.sort((a,b)=>a.rank-b.rank);
  return out;
}

function setTopN(v){
  let n=parseInt(v);
  if(isNaN(n))n=1;
  n=Math.max(1,Math.min(S.jobCount||1,n));
  S.topN=n;
  const el=document.getElementById('topNInput');
  if(el)el.value=n;
}

function runScreening(){
  if(S.screeningRan)return;
  S.runStart=Date.now();
  bumpStat('tool',1);bumpStat('agent',1);
  showTicker('RecruitingOrchestrator running…');

  const thinkArea=document.getElementById('thinkArea');
  const traceArea=document.getElementById('traceArea');
  const TRACE=[
    {i:'🔧',l:'ResumeAnonymizerTool',n:'Querying SQLite database, sealing identities into sly_data…'},
    {i:'🤖',l:'RankingAgent (Claude)',n:'Evaluating anonymized profiles by merit…'},
    {i:'🔐',l:'IdentityResolverTool',n:'Preparing to resolve top N identities only…'},
    {i:'📅',l:'SchedulingAgent',n:'Matching availability slots…'},
    {i:'✓',l:'Pipeline complete',n:'Results ready'},
  ];

  thinkArea.innerHTML=`
    <div class="thinking-bar" id="mainThinkBar">
      <div class="thinking-dots">
        <div class="thinking-dot"></div>
        <div class="thinking-dot"></div>
        <div class="thinking-dot"></div>
      </div>
      <span class="thinking-text" id="thinkText">
        Running <span class="ta">RecruitingOrchestrator</span> — anonymizing ${S.jobCount} candidates…
      </span>
      <span style="font-family:var(--font-mono);font-size:11px;color:var(--teal);margin-left:auto;flex-shrink:0;" id="elapsedTimer">0s</span>
    </div>
    <div style="height:3px;background:var(--ink-softer);border-radius:3px;margin-bottom:16px;overflow:hidden;">
      <div id="progressStripe" style="height:100%;width:0%;background:linear-gradient(90deg,var(--teal),var(--gold));border-radius:3px;transition:width .5s ease;"></div>
    </div>`;

  traceArea.innerHTML=`<div class="trace-panel"><div class="trace-hdr">Agent trace</div><div id="tSteps"></div></div>`;

  // Live elapsed timer
  const startMs=Date.now();
  const MESSAGES=[
    'Anonymizing candidates — names sealed into sly_data…',
    'RankingAgent evaluating profiles — zero PII visible to Claude…',
    'Claude scoring candidates by skills, experience, education…',
    'Still working — large candidate pool takes time…',
    'IdentityResolverTool preparing to reveal top candidates only…',
    'SchedulingAgent matching interview slots…',
    'Finalising results — almost there…',
    'Pipeline running — thank you for your patience…',
  ];
  let msgIdx=0;
  const elapsedTimer=setInterval(()=>{
    const el=document.getElementById('elapsedTimer');
    const tb=document.getElementById('thinkText');
    const ps=document.getElementById('progressStripe');
    if(!el)return;
    const secs=Math.round((Date.now()-startMs)/1000);
    el.textContent=secs+'s';
    // Update message every 30 seconds
    if(secs>0&&secs%30===0&&msgIdx<MESSAGES.length){
      if(tb) tb.innerHTML=`<span class="ta">Agent running</span> — ${MESSAGES[msgIdx]}`;
      showTicker(MESSAGES[msgIdx]);
      msgIdx++;
    }
    // Animate progress bar — never reaches 100% until done
    const fakePct=Math.min(92, (secs/360)*100);
    if(ps) ps.style.width=fakePct+'%';
  },1000);

  // Show trace steps at realistic intervals
  let traceIdx=0;
  const traceTimer=setInterval(()=>{
    if(traceIdx>=TRACE.length-1){clearInterval(traceTimer);return;}
    const el=document.getElementById('tSteps');if(!el)return;
    const t=TRACE[traceIdx];
    const d=document.createElement('div');d.className='trace-step';d.style.animationDelay='0s';
    d.innerHTML=`<span class="ti">${t.i}</span><span class="tl">${t.l} <span style="color:var(--steel);font-size:10px;">${t.n}</span></span><span class="ts ts-run">running</span>`;
    el.appendChild(d);
    traceIdx++;
  },45000); // one trace step every 45 seconds — realistic for a 5 min run

  console.log(`[BLINDSPOT] Calling /api/screen for job_role="${S.jobId}" top_n=${S.threshold}`);

  // Use XMLHttpRequest instead of fetch to avoid Chrome extension interference
  const xhr=new XMLHttpRequest();
  xhr.open('POST','/api/screen',true);
  xhr.setRequestHeader('Content-Type','application/json');
  xhr.timeout=660000; // 11 minutes

  xhr.onload=function(){
    clearInterval(traceTimer);
    clearInterval(elapsedTimer);
    const ps=document.getElementById('progressStripe');
    if(ps){ps.style.transition='width .3s ease';ps.style.width='100%';}

    if(xhr.status!==200){
      thinkArea.innerHTML=`<div class="error-box">❌ Server error ${xhr.status}. Check Flask terminal.</div>`;
      hideTicker();return;
    }

    let result;
    try{ result=JSON.parse(xhr.responseText); }
    catch(e){
      thinkArea.innerHTML=`<div class="error-box">❌ Could not parse response. Check Flask terminal.</div>`;
      hideTicker();return;
    }

    console.log(`[BLINDSPOT] Agent result status: ${result.status}`);
    if(result.token_accounting) console.log(`[BLINDSPOT] Tokens used:`,result.token_accounting);

    if(result.status==='error'){
      thinkArea.innerHTML=`<div class="error-box">❌ ${result.error}</div>`;
      traceArea.innerHTML='';hideTicker();return;
    }

    // Final trace step
    const el=document.getElementById('tSteps');
    if(el){
      el.querySelectorAll('.ts-run').forEach(x=>x.className='ts ts-done');
      const d=document.createElement('div');d.className='trace-step';d.style.animationDelay='0s';
      d.innerHTML=`<span class="ti">✓</span><span class="tl">Pipeline complete</span><span class="ts ts-done">done</span>`;
      el.appendChild(d);
    }

    S.agentResponse=result.response||'';
    S.tokenInfo=result.token_accounting||{};
    S.runEnd=Date.now();
    S.threshold=S.topN; // reveal slider starts fully revealed within the approved count

    let parsedTop=buildRankedFromStructured(result.ranking,S.applicants);
    if(parsedTop.length>0){
      console.log(`[BLINDSPOT] Used structured <<<RANKING>>> JSON — ${parsedTop.length} candidate(s).`);
    }else{
      parsedTop=parseAgentRanking(S.agentResponse,S.applicants);
      if(parsedTop.length>0)console.log(`[BLINDSPOT] Structured ranking missing — parsed ${parsedTop.length} candidate(s) from response text instead.`);
    }

    if(parsedTop.length>0){
      const usedIds=new Set(parsedTop.map(a=>a.resume_id));
      const sealedRest=S.applicants.filter(a=>!usedIds.has(a.resume_id))
        .map(a=>({...a,score:a.ai_score?Math.round(parseFloat(a.ai_score)):60}))
        .sort((a,b)=>b.score-a.score)
        .map((a,i)=>({...a,candId:`Candidate_${String(parsedTop.length+i+1).padStart(2,'0')}`}));
      S.ranked=[...parsedTop,...sealedRest];
    }else{
      console.warn('[BLINDSPOT] Could not parse agent response — falling back to ai_score ranking.');
      S.ranked=S.applicants.map((a,i)=>({
        ...a,
        candId:`Candidate_${String(i+1).padStart(2,'0')}`,
        score:a.ai_score?Math.round(parseFloat(a.ai_score)):60
      })).sort((a,b)=>b.score-a.score);
    }

    S.screeningRan=true;
    thinkArea.innerHTML='';
    hideTicker();
    showToast(`Screening complete — ${S.ranked.length} candidates ranked`);
    render();
  };

  xhr.onerror=function(){
    clearInterval(traceTimer);clearInterval(elapsedTimer);
    thinkArea.innerHTML=`<div class="error-box">❌ Network error. Make sure ns run is running.</div>`;
    hideTicker();
  };

  xhr.ontimeout=function(){
    clearInterval(traceTimer);clearInterval(elapsedTimer);
    thinkArea.innerHTML=`<div class="error-box">❌ Timed out after 11 minutes. The agent may still be running — check the ns run terminal.</div>`;
    hideTicker();
  };

  xhr.send(JSON.stringify({job_role:S.jobId,top_n:S.topN}));
}

function updateThr(v,max){
  S.threshold=parseInt(v);const p=Math.round((S.threshold/max)*100);
  document.getElementById('tVal').textContent=v;
  const sl=document.getElementById('tSlider');if(sl)sl.style.setProperty('--val',p+'%');
  document.getElementById('aList').querySelectorAll('.approve-row').forEach((row,i)=>{
    const w=i<S.threshold,rv=S.revealed&&w;
    row.className='approve-row '+(w?'will-approve ':'')+( rv?'revealed':'');
    const c=row.querySelector('.chip');if(c){c.className='chip '+(rv?'chip-open':(w?'chip-locked':'chip-out'));c.textContent=rv?'IDENTITY RELEASED':(w?'PENDING APPROVAL':'NOT SELECTED');}
    const bt=row.querySelector('.blur-text');if(bt){bt.className='blur-text '+(rv?'revealed':'');bt.textContent=rv?S.ranked[i].name:S.ranked[i].candId;}
    const li=row.querySelector('.lock-icon');if(li)li.textContent=rv?'🔓':'🔒';
  });
}

function approveTop(){
  bumpStat('tool',1);showTicker('IdentityResolverTool resolving…');
  // Store approved candidates as objects with their rank number
  S.approvedCandidates=S.ranked.slice(0,S.threshold).map((a,i)=>({...a,rank:i+1}));
  S.approvedCandidates.forEach(a=>S.approvedIds.add(a.resume_id));
  setTimeout(()=>{S.revealed=true;hideTicker();showToast(`${S.threshold} identities released`);render();},800);
}

function confirmSlot(id,name,slot){

function confirmAll(){

  setTimeout(()=>{showToast(`📧 Calendar invites sent to all ${approved.length} candidates`);render();},approved.length*350+200);

        <div style="display:flex;align-items:center;gap:10px;">
          <div style="width:70px;height:4px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;"><div style="height:100%;width:${a.score}%;background:linear-gradient(90deg,var(--teal),rgba(46,196,176,.7));border-radius:3px;"></div></div>
          <span style="font-family:var(--font-mono);font-size:12px;color:var(--teal);">${a.score}</span>
          ${S.approvedIds.has(a.resume_id)?`<span class="chip chip-open">REVEALED</span>`:`<span class="chip chip-locked">SEALED</span>`}
        </div>
      </div>`).join('')}</div>
  </div>`:''}
  <div class="privacy-stat"><b>Zero PII</b> was exposed to any LLM during this run. <b>${sealed>0?sealed:S.jobCount-topN}</b> of <b>${S.jobCount}</b> candidate identities remain permanently sealed.</div>
  `:`<div class="empty-note" style="margin-top:20px;">Run the blind screening pipeline first to see stats from your last run.</div>`}`;
}

/* ══════════════════════════════════════
   Navigation — load data on stage change
══════════════════════════════════════ */
// Override goTo to trigger data loads when needed
const _goTo=goTo;
window.goTo=function(n){
  _goTo(n);
  if(n===2&&S.applicants.length===0)loadApplicants();
};

/* ── Init ── */
checkConnection();
setInterval(checkConnection,30000);
loadRoles();
render();
</script>
</body>
